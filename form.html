<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 40px; display: flex; justify-content: center; }
    .form-container { width: 100%; max-width: 500px; padding: 20px; border: 1px solid #e1e4e8; border-radius: 6px; background-color: #fafbfc; }
  </style>
</head>
<body>
  <div class="form-container">
    <h3 style="margin-top: 0; color: #24292e;">Send Me Feedback</h3>
    <form action="https://formspree.io" method="POST">
      <input type="hidden" name="_next" value="https://github.com">
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600;">Your Email (Optional):</label>
        <input type="email" name="_replyto" placeholder="email@example.com" style="width: 100%; padding: 8px; border: 1px solid #d1d5da; border-radius: 6px; box-sizing: border-box;">
      </div>
      <div style="margin-bottom: 15px;">
        <label style="display: block; margin-bottom: 6px; font-weight: 600;">Message:</label>
        <textarea name="message" rows="5" required placeholder="Type your feedback here..." style="width: 100%; padding: 8px; border: 1px solid #d1d5da; border-radius: 6px; box-sizing: border-box; resize: vertical;></textarea>
      </div>
      <button type="submit" style="width: 100%; padding: 10px; background-color: #24292e; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">Submit Feedback</button>
    </form>
  </div>
</body>
</html>
