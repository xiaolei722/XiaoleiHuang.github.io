<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiaolei Huang</title>
  <style>
    /* Global Layout */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      min-height: 100vh;
      overflow: hidden; /* Prevents double scrollbars */
    }

    /* Slate Blue Sidebar - Stays fixed on the left */
    .sidebar {
      width: 300px;
      background-color: #2c3e50; /* Modern Slate Blue */
      color: white;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      box-sizing: border-box;
      z-index: 10;
    }

    .sidebar h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    /* Navigation Links inside Sidebar */
    .nav-links {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .sidebar a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    .sidebar p {
      font-size: 1.1rem;
      color: #c9d1d9;
      margin-top: 20px;
      line-height: 1.5;
    }

    /* Right Side Content Window Container */
    .main-content {
      flex: 1;
      height: 100vh;
      background-color: #ffffff;
      position: relative;
    }

    /* The iframe window that loads your pages */
    .content-window {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Responsive Design for Mobile Screens */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
        overflow: auto;
      }
      .sidebar {
        width: 100%;
        padding: 20px;
      }
      .main-content {
        height: calc(100vh - 200px); /* Keeps content window visible below header */
      }
    }
  </style>
</head>
<body>

  <!-- LEFT SIDEBAR: This will never reload or disappear -->
  <div class="sidebar">
    <h1>Xiaolei Huang</h1>
    
    <div class="nav-links">
      <!-- Clicking these will open the pages inside the target="content-frame" on the right -->
      <a href="form.html" target="content-frame">Home / Feedback</a>
      <a href="resume.html" target="content-frame">Resume</a>
    </div>

    <p>Welcome! Thank you for visiting my site. Great to have you here.</p>
  </div>

  <!-- RIGHT CONTENT AREA: Changes dynamically -->
  <div class="main-content">
    <!-- It starts by showing form.html automatically -->
    <iframe src="form.html" name="content-frame" class="content-window"></iframe>
  </div>

</body>
</html>
